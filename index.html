<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculadora de Investimentos Impressionadora</title>
        <link rel="stylesheet" href="./src/style.css" />
    </head>
    <body class="h-dvh grid grid-cols-3 grid-rows-2">
        <aside
            class="bg-emerald-300 row-span-2 flex flex-col justify-between px-2 py-5"
        >
            <h1 class="text-2xl font-bold px-6">
                Calculadora de Investimentos
            </h1>
            <form class="w-full">
                <div class="flex flex-col w-full px-6 my-2">
                    <label for="starting-amount" class="font-bold text-gray-700"
                        >Investimento inicial</label
                    >
                    <div class="flex">
                        <input
                            class="bg-emerald-200 w-1/8 text-center rounded-l-lg py-1"
                            type="text"
                            value="R$"
                            disabled
                        />
                        <input
                            class="w-7/8 bg-white rounded-r-lg px-2 py-1"
                            type="text"
                            placeholder="0.00"
                            id="starting-amount"
                        />
                    </div>
                </div>
                <div class="flex flex-col w-full px-6 my-2">
                    <label
                        for="aditional-contribution"
                        class="font-bold text-gray-700"
                        >Aportes adicionais</label
                    >
                    <div class="flex">
                        <input
                            class="bg-emerald-200 w-1/8 text-center rounded-l-lg py-1"
                            type="text"
                            value="R$"
                            disabled
                        />
                        <input
                            class="w-7/8 bg-white rounded-r-lg px-1 py-1"
                            type="text"
                            placeholder="0.00"
                            id="aditional-contribution"
                        />
                    </div>
                </div>
                <div class="flex flex-col w-full px-6 my-2">
                    <label for="time-amount" class="font-bold text-gray-700"
                        >Prazo</label
                    >
                    <div class="flex">
                        <input
                            class="w-6/8 bg-white rounded-l-lg px-2 py-1"
                            type="text"
                            placeholder="0"
                            id="time-amount"
                        />
                        <select
                            name="time-amount-period"
                            id="time-amount-period"
                            class="w-2/8 rounded-r-lg bg-white border-l-2 border-emerald-600 text-center hover:bg-emerald-950 hover:text-slate-200 py-1"
                        >
                            <option value="monthly">Mensal</option>
                            <option value="yearly">Anual</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col w-full px-6 my-2">
                    <label for="tax-rate" class="font-bold text-gray-700"
                        >Impostos sobre lucro</label
                    >
                    <div class="flex">
                        <input
                            class="bg-emerald-200 w-1/8 text-center rounded-l-lg py-1"
                            type="text"
                            value="%"
                            disabled
                        />
                        <input
                            class="w-7/8 bg-white rounded-r-lg px-2 py-1"
                            type="text"
                            placeholder="0"
                            id="tax-rate"
                        />
                    </div>
                </div>
                <div class="flex flex-col w-full px-6 my-2">
                    <label for="return-rate" class="font-bold text-gray-700"
                        >Rentabilidade</label
                    >
                    <div class="flex">
                        <input
                            class="bg-emerald-200 w-1/8 text-center rounded-l-lg py-1"
                            type="text"
                            value="%"
                            disabled
                        />
                        <input
                            class="w-5/8 bg-white px-2 py-1"
                            type="text"
                            placeholder="0"
                            id="return-rate"
                        />
                        <select
                            name="evaluation-period"
                            id="evaluation-period"
                            class="w-2/8 rounded-r-lg bg-white border-l-2 border-emerald-600 text-center py-1 hover:bg-emerald-950 hover:text-slate-200"
                        >
                            <option value="monthly">Mensal</option>
                            <option value="yearly">Anual</option>
                        </select>
                    </div>
                </div>
            </form>
            <div class="flex w-full gap-2 h-12 px-6 my-8">
                <button
                    class="w-1/2 rounded-lg bg-emerald-950 text-slate-200 hover:bg-emerald-800"
                >
                    Calcular
                </button>
                <button class="w-1/2 rounded-lg hover:bg-emerald-800">
                    Limpar
                </button>
            </div>
        </aside>
        <main>
            <section>
                <p>Resultados</p>
            </section>
        </main>
    </body>
</html>
